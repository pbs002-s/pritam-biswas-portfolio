<!doctype html>
<html lang="en" class="antialiased text-gray-200 bg-[#09090b]">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Ensure window.fetch is writable and configurable to prevent errors from extensions/scripts overriding it in sandboxed environments.
      try {
        if (window.fetch) {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            value: originalFetch,
            writable: true,
            configurable: true,
            enumerable: true
          });
        }
      } catch (e) {
        console.warn('Unable to redefine window.fetch:', e);
      }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pritam Biswas — Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="h-screen w-screen overflow-hidden bg-[#09090b] selection:bg-[#00e559]/30 text-gray-200">
    <div id="root" class="h-full w-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
